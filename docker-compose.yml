services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: consensus_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-your-username/consensus-tracker}:latest
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/consensus_tracker
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3002}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node_modules/.bin/prisma migrate deploy && node_modules/.bin/next start"

  cron:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      - app
    command: >
      sh -c "apk add --no-cache wget &&
      echo '0 6 * * * wget -q -O /dev/null --header \"x-cron-secret: ${CRON_SECRET}\" http://app:3000/api/cron' | crontab - &&
      crond -f -l 2"

volumes:
  postgres_data:
